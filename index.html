<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>테크포임팩트 캠퍼스 · 사회혁신가 신청 현황</title>
<style>
  @font-face {
    font-family: 'KakaoBigSans';
    src: url('https://kakao-impact-foundation.github.io/campus_2026_spring/_next/static/media/KakaoBigSans_ExtraBold-s.p.3i93y_9jgiys7.woff2') format('woff2');
    font-weight: 800; font-display: swap;
  }
  @font-face {
    font-family: 'KakaoBigSans';
    src: url('https://kakao-impact-foundation.github.io/campus_2026_spring/_next/static/media/KakaoBigSans_Bold-s.p.2g6eznqppexyp.woff2') format('woff2');
    font-weight: 700; font-display: swap;
  }
  @font-face {
    font-family: 'KakaoBigSans';
    src: url('https://kakao-impact-foundation.github.io/campus_2026_spring/_next/static/media/KakaoBigSans_Regular-s.p.1jbj0r48zwnit.woff2') format('woff2');
    font-weight: 400; font-display: swap;
  }
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');

  :root {
    --pink: #E470DC;
    --pink-text: #C13DB7; /* 흰 배경 위 텍스트용 (대비 4.5:1) */
    --pink-soft: #F7CDF3;
    --pink-faint: #FBE9FA;
    --ink: #1C1C1C;
    --muted: #8C8C8C;
    --body: #4A4A4A;
    --card: #F6F8FA;
    --line: #ECEFF3;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    background: var(--white);
    color: var(--ink);
    padding: 44px 28px 80px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1240px; margin: 0 auto; }

  /* ── entrance animation ─────────────── */
  @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  @keyframes pop  { from { opacity: 0; transform: scale(.4); } to { opacity: 1; transform: scale(1); } }
  .rise { animation: rise .55s cubic-bezier(.2,.7,.2,1) both; }

  /* ── header ─────────────────────────── */
  header { margin-bottom: 36px; }
  .topBadge { display: inline-flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  .topBadge svg { height: 24px; width: auto; display: block; }
  .topBadge .term { color: var(--muted); font-weight: 700; font-size: 13px; }
  h1 {
    font-family: 'KakaoBigSans', Pretendard, sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 4vw, 42px);
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 14px;
  }
  .updated { margin-top: 6px; font-size: 13px; color: var(--muted); }

  /* ── 목표 달성 히어로 카드 ───────────── */
  .hero {
    display: flex; align-items: center; gap: 40px;
    margin-bottom: 22px;
  }
  .hero .heroL { flex: 0 0 auto; }
  .hero .heroR { flex: 1; min-width: 260px; }
  .hero .meter { margin-top: 0; }
  @media (max-width: 720px) {
    .hero { flex-direction: column; align-items: stretch; gap: 18px; }
  }

  /* ── layout ─────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: minmax(0, 7fr) minmax(330px, 4fr);
    gap: 22px;
    align-items: start;
  }
  @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
  .col { display: flex; flex-direction: column; gap: 22px; }

  .card { background: var(--card); border-radius: 24px; padding: 26px; }
  .cardTitle {
    font-family: 'KakaoBigSans', Pretendard, sans-serif;
    font-weight: 800; font-size: 19px; margin-bottom: 4px;
  }
  .cardSub { font-size: 13.5px; color: var(--muted); margin-bottom: 16px; }

  /* ── map ────────────────────────────── */
  #mapBox { display: flex; justify-content: center; }
  #mapBox svg { width: auto; height: auto; max-width: 100%; max-height: min(58vh, 520px); display: block; overflow: visible; }
  .rgn { cursor: pointer; transition: fill .25s ease, filter .2s ease; }
  .rgn:hover { filter: brightness(.955); }
  .rgn.sel { stroke: var(--ink); stroke-width: 1.4; }
  .rgnBadge {
    cursor: pointer;
    transform-box: fill-box; transform-origin: center;
    animation: pop .45s cubic-bezier(.3,1.4,.4,1) backwards;
    transition: opacity .3s ease;
  }
  .rgnName { pointer-events: none; transition: opacity .3s ease; }
  .dimmed { opacity: .25; }

  .legend {
    display: flex; align-items: center; gap: 8px;
    margin-top: 14px; font-size: 12px; color: var(--muted); font-weight: 600;
  }
  .legend .bar { width: 110px; height: 10px; border-radius: 999px; }

  .natPill {
    display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap;
    background: var(--white); border-radius: 999px;
    padding: 8px 16px; margin-bottom: 14px;
    font-size: 13px; color: var(--body); font-weight: 600;
  }
  .natPill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--pink); flex: 0 0 auto; }
  .natPill b { font-weight: 800; color: var(--ink); }

  /* region detail panel */
  .detail {
    margin-top: 16px;
    background: var(--white);
    border-radius: 18px;
    padding: 18px 20px;
    opacity: 0; transform: translateY(8px);
    transition: opacity .3s ease, transform .3s ease;
    min-height: 20px;
  }
  .detail.show { opacity: 1; transform: none; }
  .detail .dTitle {
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
    font-family: 'KakaoBigSans', Pretendard, sans-serif;
    font-weight: 800; font-size: 17px; margin-bottom: 10px;
  }
  .detail .dCount { font-size: 13px; color: var(--pink-text); font-weight: 800; }
  .detail .dHint { font-size: 13px; color: var(--muted); font-weight: 400; }
  .detail ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .detail li {
    display: flex; align-items: center; gap: 8px;
    font-size: 14.5px; font-weight: 600; color: var(--ink);
    animation: rise .35s ease both;
    cursor: pointer;
  }
  .detail li:hover { color: var(--pink-text); }
  .detail li .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--pink); flex: 0 0 auto; }
  .detail li .tag {
    font-size: 11px; font-weight: 700; color: var(--muted);
    background: var(--card); border-radius: 999px; padding: 2px 8px;
  }
  .detail .none { font-size: 14px; color: var(--muted); }

  /* ── 활동 분야 키워드 필터 ── */
  .kwRow { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 4px; }
  .kw {
    background: var(--card); border: none;
    border-radius: 999px; padding: 8px 15px;
    font-family: inherit; font-size: 13px; font-weight: 600; color: var(--body);
    cursor: pointer;
    transition: background .2s, color .2s, transform .15s;
  }
  .kw:hover { transform: translateY(-1px); }
  .kw .n { color: var(--muted); font-weight: 700; margin-left: 3px; }
  .kw.on { background: var(--ink); color: #fff; }
  .kw.on .n { color: #fff; opacity: .7; }

  /* ── stats ──────────────────────────── */
  .statLabel { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 10px; }
  .goalRow { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .bigNum {
    font-family: 'KakaoBigSans', Pretendard, sans-serif;
    font-weight: 800; font-size: 60px; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .goalRow .of {
    font-family: 'KakaoBigSans', Pretendard, sans-serif;
    font-weight: 700; font-size: 20px; color: var(--muted);
  }
  .pct {
    margin-left: auto;
    font-family: 'KakaoBigSans', Pretendard, sans-serif;
    font-weight: 800; font-size: 24px;
    background: var(--ink); color: #fff;
    border-radius: 999px; padding: 8px 18px;
    font-variant-numeric: tabular-nums;
  }
  .meter {
    margin-top: 20px; height: 14px;
    background: var(--white);
    border-radius: 999px; overflow: hidden;
  }
  .meter > i {
    display: block; height: 100%; width: 0%;
    background: var(--pink);
    border-radius: 999px;
    transition: width 1s cubic-bezier(.2,.8,.2,1);
  }
  .subStats { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
  .chip {
    background: var(--white); border-radius: 999px;
    padding: 7px 14px; font-size: 13px; font-weight: 600; color: var(--body);
  }
  .chip b { font-weight: 800; color: var(--ink); }

  /* ── org list ───────────────────────── */
  .listHead { display: flex; align-items: baseline; gap: 10px; padding: 2px 4px; }
  .listHead h2 {
    font-family: 'KakaoBigSans', Pretendard, sans-serif;
    font-weight: 800; font-size: 19px;
  }
  .listHead .count { font-size: 14px; color: var(--pink-text); font-weight: 800; }
  .listHead .reset {
    margin-left: auto;
    font-size: 13px; color: var(--muted); font-weight: 600;
    background: none; border: none; cursor: pointer;
    font-family: inherit;
    text-decoration: underline; text-underline-offset: 3px;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .listHead .reset.on { opacity: 1; pointer-events: auto; }
  .listHead .reset:hover { color: var(--ink); }

  .orgList { display: flex; flex-direction: column; gap: 12px; }
  .org {
    background: var(--card); border-radius: 20px;
    padding: 18px 20px;
    transition: transform .2s ease, box-shadow .2s ease;
    animation: rise .45s ease both;
    cursor: pointer;
    position: relative;
  }
  .org:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(28,28,28,.06); }
  .org .over { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 6px; display: flex; gap: 6px; flex-wrap: wrap; }
  .org .name {
    font-family: 'KakaoBigSans', Pretendard, sans-serif;
    font-weight: 700; font-size: 17px; margin-bottom: 8px;
    padding-right: 20px;
  }
  .org .meta { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--body); flex-wrap: wrap; }
  .org .meta .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--pink); flex: 0 0 auto; }
  .org .meta .rg { font-weight: 700; color: var(--ink); }
  .org .meta .sep { color: var(--line); }
  .org .kwTags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
  .org .kwTags span {
    font-size: 11px; font-weight: 600; color: var(--muted);
    background: var(--white); border-radius: 999px; padding: 3px 9px;
  }
  .org .arrow {
    position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 18px; font-weight: 700;
    transition: transform .2s, color .2s;
  }
  .org:hover .arrow { transform: translateY(-50%) translateX(3px); color: var(--pink-text); }
  .empty { text-align: center; color: var(--muted); padding: 30px 0; font-size: 14px; background: var(--card); border-radius: 20px; }

  /* ── 조직 상세 모달 ─────────────────── */
  .overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(28,28,28,.45);
    display: none;
    align-items: flex-start; justify-content: center;
    padding: 5vh 20px;
    overflow-y: auto;
    opacity: 0; transition: opacity .25s ease;
  }
  .overlay.open { display: flex; }
  .overlay.vis { opacity: 1; }
  .modal {
    background: var(--white); border-radius: 24px;
    max-width: 760px; width: 100%;
    padding: 34px 36px 38px;
    transform: translateY(18px) scale(.98);
    transition: transform .3s cubic-bezier(.2,.8,.2,1);
    position: relative;
  }
  .overlay.vis .modal { transform: none; }
  @media (max-width: 640px) { .modal { padding: 26px 22px 30px; } }
  .mClose {
    position: absolute; right: 20px; top: 20px;
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--card); border: none; cursor: pointer;
    font-size: 16px; color: var(--body); font-family: inherit;
    transition: background .2s;
  }
  .mClose:hover { background: var(--line); }
  .mOver { font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
  .mName {
    font-family: 'KakaoBigSans', Pretendard, sans-serif;
    font-weight: 800; font-size: 26px; letter-spacing: -0.01em;
    margin-bottom: 14px; padding-right: 40px;
  }
  .mChips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 22px; }
  .mChips span {
    font-size: 12px; font-weight: 700;
    background: var(--pink-faint); color: var(--pink-text);
    border-radius: 999px; padding: 5px 12px;
  }
  .mChips span.gray { background: var(--card); color: var(--body); }

  .mGrid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px 18px;
    background: var(--card); border-radius: 18px; padding: 18px 20px;
    margin-bottom: 22px;
  }
  @media (max-width: 640px) { .mGrid { grid-template-columns: 1fr; } }
  .mRow { font-size: 13.5px; line-height: 1.5; }
  .mRow .k { display: block; font-size: 11.5px; font-weight: 700; color: var(--muted); margin-bottom: 2px; }
  .mRow .v { color: var(--ink); font-weight: 600; word-break: break-all; }
  .mRow .v a { color: var(--pink-text); text-decoration: underline; text-underline-offset: 2px; }

  .mSec { margin-bottom: 20px; }
  .mSec h3 {
    font-family: 'KakaoBigSans', Pretendard, sans-serif;
    font-weight: 800; font-size: 15px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 7px;
  }
  .mSec h3::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--pink); }
  .mSec p { font-size: 14.5px; line-height: 1.75; color: var(--body); white-space: pre-line; }
  .mSec ol { padding-left: 0; list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .mSec ol li {
    font-size: 14.5px; line-height: 1.65; color: var(--body);
    background: var(--card); border-radius: 14px; padding: 12px 16px;
    display: flex; gap: 10px;
  }
  .mSec ol li .qn {
    flex: 0 0 auto;
    font-family: 'KakaoBigSans', Pretendard, sans-serif;
    font-weight: 800; color: var(--pink-text); font-size: 14px;
  }
  .mOutcome {
    display: inline-block;
    background: var(--ink); color: #fff;
    font-size: 13.5px; font-weight: 700;
    border-radius: 999px; padding: 9px 18px;
  }
  .mDivider {
    margin: 26px 0 22px; border: none; border-top: 1.5px dashed var(--line);
  }
  .mSubHead {
    font-size: 12.5px; font-weight: 800; color: var(--pink-text);
    background: var(--pink-faint); border-radius: 999px;
    display: inline-block; padding: 5px 13px; margin-bottom: 14px;
  }

  footer { margin-top: 48px; text-align: center; font-size: 12.5px; color: var(--muted); }

  /* ── 비밀번호 게이트 (캐주얼 차단) ──── */
  body.locked .wrap { display: none; }
  #gate {
    position: fixed; inset: 0; z-index: 100;
    background: var(--white);
    display: none; align-items: center; justify-content: center;
    padding: 24px;
  }
  body.locked #gate { display: flex; }
  .gateCard {
    background: var(--card); border-radius: 24px;
    padding: 40px 36px; max-width: 380px; width: 100%;
    text-align: center;
  }
  .gateCard h2 {
    font-family: 'KakaoBigSans', Pretendard, sans-serif;
    font-weight: 800; font-size: 20px; margin: 14px 0 6px;
  }
  .gateCard p { font-size: 13.5px; color: var(--muted); margin-bottom: 20px; }
  .gateCard input {
    width: 100%; border: none; border-radius: 999px;
    padding: 13px 18px; font-size: 15px; font-family: inherit;
    background: var(--white); text-align: center;
    outline: 2px solid transparent; transition: outline-color .2s;
  }
  .gateCard input:focus { outline-color: var(--pink); }
  .gateCard button {
    width: 100%; margin-top: 10px;
    border: none; border-radius: 999px;
    padding: 13px 18px; font-size: 15px; font-weight: 700; font-family: inherit;
    background: var(--ink); color: #fff; cursor: pointer;
  }
  .gateCard .err { color: var(--pink-text); font-size: 13px; font-weight: 700; margin-top: 10px; min-height: 18px; }
</style>
</head>
<body class="locked">
<div id="gate">
  <div class="gateCard">
    <div style="font-family:'KakaoBigSans',Pretendard,sans-serif;font-weight:800;font-size:13px;">TECH FOR !MPACT <span style="background:var(--pink);color:#fff;border-radius:999px;padding:3px 10px;font-size:11.5px;">Campus</span></div>
    <h2>내부 대시보드</h2>
    <p>사회혁신가 신청 현황은 운영팀용이에요.<br/>비밀번호를 입력해 주세요.</p>
    <input type="password" id="gatePw" placeholder="비밀번호" autocomplete="off" />
    <button id="gateBtn">들어가기</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>
<div class="wrap">
  <header class="rise">
    <div class="topBadge"><svg aria-label="TECH FOR IMPACT Campus" viewBox="0 0 2341 205" fill="none" xmlns="http://www.w3.org/2000/svg">

const GOAL = 24;
let ORGS = [];          // dedupe된 조직 목록
let BY_REGION = {};     // 권역별 조직 목록
let NAT_ORGS = [];      // 전국 활동 조직
let selected = null;    // 선택된 권역
let keyword = null;     // 선택된 활동 분야

function esc(s){ return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* 같은 조직 판별: (사)/사단법인/(주)/주식회사/공백 차이 무시 */
function orgKey(name){
  return String(name).replace(/\(사\)|사단법인|\(주\)|주식회사|\(재\)|재단법인|\s/g, '');
}
function splitFields(s){
  return String(s || '').split(',').map(x => x.trim().replace(/:$/,'')).filter(Boolean);
}

function dedupeOrgs(rows){
  const map = new Map();
  rows.forEach(r => {
    const key = orgKey(r.org);
    if (!map.has(key)) {
      map.set(key, { ...r, key, people: [r.name], regions: [...r.regions],
                     fieldsArr: splitFields(r.fields), rows: [r] });
    } else {
      const o = map.get(key);
      o.people.push(r.name);
      o.rows.push(r);
      r.regions.forEach(rg => { if (!o.regions.includes(rg)) o.regions.push(rg); });
      splitFields(r.fields).forEach(f => { if (!o.fieldsArr.includes(f)) o.fieldsArr.push(f); });
    }
  });
  return [...map.values()];
}

function countUp(el, target, suffix = '', dur = 900){
  const t0 = performance.now();
  function tick(t){
    const p = Math.min(1, (t - t0) / dur);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(target * eased) + suffix;
    if (p < 1) requestAnimationFrame(tick);
  }
  el.textContent = target + suffix; /* rAF가 지연돼도 값은 보이게 */
  requestAnimationFrame(tick);
}

/* ── 신청 수 → 핑크 음영 (많을수록 진하게) ── */
function maxCount(){
  return Math.max(1, ...Object.values(BY_REGION).map(a => a.length));
}
function shade(n){
  if (!n) return '#FFFFFF';
  const t = n / maxCount();
  const l = 92 - 25 * t;   /* 밝기 92%(연함) → 67%(#E470DC) */
  return `hsl(304, 68%, ${l}%)`;
}

/* ── 지도 ── */
function renderMap(){
  let shapes = '', marks = '';
  Object.keys(REGION_SHAPES).forEach(rg => {
    shapes += `<path class="rgn" data-region="${esc(rg)}" d="${REGION_SHAPES[rg]}"
               fill="${shade((BY_REGION[rg] || []).length)}"
               stroke="var(--card)" stroke-width="1.6" stroke-linejoin="round"/>`;
  });
  let i = 0;
  Object.entries(REGIONS).forEach(([rg, [ax, ay]]) => {
    const n = (BY_REGION[rg] || []).length;
    const short = rg === '대전/세종/충청' ? '충청' : rg === '부산/울산/경남' ? '경남권' :
                  rg === '광주/전라' ? '전라' : rg === '경기/인천' ? '경기·인천' :
                  rg === '대구/경북' ? '경북권' : rg;
    if (n > 0) {
      marks += `
        <g class="rgnBadge" data-region="${esc(rg)}" style="animation-delay:${.35 + i*0.07}s">
          <circle cx="${ax}" cy="${ay}" r="7.5" fill="var(--ink)" stroke="#fff" stroke-width="1.6"/>
          <text x="${ax}" y="${ay + 3}" text-anchor="middle" font-size="8.5" font-weight="800" fill="#fff"
                font-family="KakaoBigSans, Pretendard, sans-serif">${n}</text>
        </g>
        <text class="rgnName" data-label="${esc(rg)}" x="${ax}" y="${ay + 17}" text-anchor="middle"
              font-size="6.5" font-weight="700" fill="var(--ink)"
              font-family="Pretendard, sans-serif">${esc(short)}</text>`;
      i++;
    } else {
      marks += `<text class="rgnName" data-label="${esc(rg)}" x="${ax}" y="${ay + 5}" text-anchor="middle"
                font-size="6.5" font-weight="600" fill="var(--muted)"
                font-family="Pretendard, sans-serif">${esc(short)}</text>`;
    }
  });

  document.getElementById('mapBox').innerHTML =
    `<svg viewBox="270 120 390 600" xmlns="http://www.w3.org/2000/svg" role="img"
          aria-label="신청 조직 활동 지역 지도">${shapes}${marks}</svg>`;

  document.querySelectorAll('#mapBox [data-region]').forEach(el => {
    el.addEventListener('click', () => selectRegion(el.dataset.region));
  });
  applySelection();

  const mc = maxCount();
  document.getElementById('shadeLegend').innerHTML = ORGS.length ? `
    <span>신청 조직 수</span>
    <span>1팀</span>
    <span class="bar" style="background:linear-gradient(to right, ${shade(1)}, ${shade(mc)})"></span>
    <span>${mc}팀</span>` : '';
}

/* ── 지역 선택: 테두리 강조 + 나머지 라벨 흐림 ── */
function selectRegion(rg){
  selected = (selected === rg) ? null : rg;
  applySelection();
  renderDetail();
  renderOrgList();
}

function applySelection(){
  const svg = document.querySelector('#mapBox svg');
  if (!svg) return;
  svg.querySelectorAll('.sel').forEach(e => e.classList.remove('sel'));
  svg.querySelectorAll('.dimmed').forEach(e => e.classList.remove('dimmed'));
  if (!selected) return;
  const path  = svg.querySelector(`path[data-region="${selected}"]`);
  const badge = svg.querySelector(`g[data-region="${selected}"]`);
  const label = svg.querySelector(`text[data-label="${selected}"]`);
  svg.querySelectorAll('.rgnBadge, .rgnName').forEach(el => {
    if (el !== badge && el !== label) el.classList.add('dimmed');
  });
  if (path) {
    /* 테두리가 이웃 지역에 가려지지 않도록 위 레이어로 (라벨보다는 아래) */
    svg.insertBefore(path, svg.querySelector('.rgnBadge, .rgnName'));
    path.classList.add('sel');
  }
}

function renderDetail(){
  const box = document.getElementById('regionDetail');
  if (!selected) {
    box.className = 'detail show';
    box.innerHTML = `<div class="dTitle">전체 지역 <span class="dHint">지도를 클릭해 지역별 신청 조직을 확인해 보세요</span></div>`;
    return;
  }
  const local = BY_REGION[selected] || [];
  const items = [
    ...local.map(o => ({ org: o, nat: false })),
    ...NAT_ORGS.filter(o => !local.includes(o)).map(o => ({ org: o, nat: true }))
  ];
  box.className = 'detail';
  void box.offsetWidth;
  box.className = 'detail show';
  box.innerHTML = `
    <div class="dTitle">${esc(selected)} <span class="dCount">${items.length}팀</span></div>
    ${items.length ? `<ul>${items.map((it, i) => `
      <li style="animation-delay:${i * 0.06}s" data-key="${esc(it.org.key)}">
        <span class="dot"></span>${esc(it.org.org)}
        <span class="tag">${esc(it.org.type.split('(')[0].replace(':','').trim())}</span>
        ${it.nat ? '<span class="tag">전국 활동</span>' : ''}
      </li>`).join('')}</ul>`
      : '<div class="none">아직 이 지역에서 신청한 조직이 없어요.</div>'}`;
  box.querySelectorAll('li[data-key]').forEach(li =>
    li.addEventListener('click', () => openOrg(li.dataset.key)));
}

/* ── 활동 분야 키워드 필터 ── */
function renderKeywords(){
  const counts = {};
  ORGS.forEach(o => o.fieldsArr.forEach(f => counts[f] = (counts[f] || 0) + 1));
  const kws = Object.entries(counts).sort((a,b) => b[1] - a[1]);
  document.getElementById('kwRow').innerHTML =
    `<button class="kw ${!keyword ? 'on' : ''}" data-kw="">전체<span class="n">${ORGS.length}</span></button>` +
    kws.map(([f, n]) =>
      `<button class="kw ${keyword === f ? 'on' : ''}" data-kw="${esc(f)}">${esc(f)}<span class="n">${n}</span></button>`
    ).join('');
  document.querySelectorAll('#kwRow .kw').forEach(btn =>
    btn.addEventListener('click', () => {
      keyword = btn.dataset.kw || null;
      renderKeywords();
      renderOrgList();
    }));
}

/* ── 조직 리스트 ── */
function renderOrgList(){
  const list = document.getElementById('orgList');
  const reset = document.getElementById('resetBtn');
  const countEl = document.getElementById('listCount');

  let orgs = [...ORGS].sort((a,b) => b.ts.localeCompare(a.ts));
  if (selected) orgs = orgs.filter(o => o.regions.includes(selected) || o.regions.includes(NATIONWIDE));
  if (keyword)  orgs = orgs.filter(o => o.fieldsArr.includes(keyword));

  const filters = [selected, keyword].filter(Boolean);
  reset.classList.toggle('on', filters.length > 0);
  countEl.textContent = (filters.length ? filters.join(' · ') + ' ' : '') + orgs.length + '팀';

  if (!orgs.length) {
    list.innerHTML = '<div class="empty">조건에 맞는 조직이 아직 없어요.</div>';
    return;
  }
  list.innerHTML = orgs.map((o, i) => `
    <div class="org" style="animation-delay:${i * 0.06}s" data-key="${esc(o.key)}">
      <div class="over"><span>${esc(o.type.split('(')[0].replace(':','').trim())}</span><span>·</span><span>${esc(o.ts.slice(5,16))} 신청</span></div>
      <div class="name">${esc(o.org)}</div>
      <div class="meta">
        <span class="dot"></span><span class="rg">${esc(o.regions.join(' · '))}</span>
        <span class="sep">|</span><span>${esc(o.people.join(', '))}</span>
      </div>
      <div class="kwTags">${o.fieldsArr.slice(0,5).map(f => `<span>${esc(f)}</span>`).join('')}${o.fieldsArr.length > 5 ? `<span>+${o.fieldsArr.length - 5}</span>` : ''}</div>
      <span class="arrow">›</span>
    </div>`).join('');
  list.querySelectorAll('.org').forEach(card =>
    card.addEventListener('click', () => openOrg(card.dataset.key)));
}

/* ── 조직 상세 모달: 시트의 모든 응답을 보기 좋게 ── */
function linkify(s){
  return esc(s).replace(/(https?:\/\/[^\s,]+|www\.[^\s,]+)/g,
    u => `<a href="${u.startsWith('http') ? u : 'https://' + u}" target="_blank" rel="noopener">${u}</a>`);
}
function questionList(q){
  const parts = String(q || '').split(/\s*(?=\d\s*[.)．])/).map(s => s.trim()).filter(Boolean);
  if (parts.length < 2) return q ? `<p>${esc(q)}</p>` : '';
  return `<ol>${parts.map(p => {
    const m = p.match(/^(\d+)\s*[.)．]\s*(.*)$/s);
    return m ? `<li><span class="qn">Q${m[1]}</span><span>${esc(m[2])}</span></li>`
             : `<li><span>${esc(p)}</span></li>`;
  }).join('')}</ol>`;
}
function personBlock(r, headline){
  return `
    ${headline ? `<div class="mSubHead">${esc(headline)}</div>` : ''}
    <div class="mGrid">
      <div class="mRow"><span class="k">담당자</span><span class="v">${esc(r.name)}</span></div>
      <div class="mRow"><span class="k">직함 · 역할</span><span class="v">${esc(r.role || '-')}</span></div>
      ${r.phone ? `<div class="mRow"><span class="k">연락처</span><span class="v">${esc(r.phone)}</span></div>` : ''}
      ${r.email ? `<div class="mRow"><span class="k">이메일</span><span class="v">${esc(r.email)}</span></div>` : ''}
      <div class="mRow"><span class="k">조직 활동 기간</span><span class="v">${esc(r.years || '-')}</span></div>
      <div class="mRow"><span class="k">알게 된 경로</span><span class="v">${esc(r.path || '-')}</span></div>
      <div class="mRow" style="grid-column:1/-1"><span class="k">홈페이지 · SNS</span><span class="v">${r.link ? linkify(r.link) : '-'}</span></div>
    </div>
    ${r.intro ? `<div class="mSec"><h3>조직 소개</h3><p>${esc(r.intro)}</p></div>` : ''}
    ${r.reason ? `<div class="mSec"><h3>참여하고 싶은 이유</h3><p>${esc(r.reason)}</p></div>` : ''}
    ${r.questions ? `<div class="mSec"><h3>학생들과 함께 풀고 싶은 질문</h3>${questionList(r.questions)}</div>` : ''}
    ${r.outcome ? `<div class="mSec"><h3>기대하는 결과물 수준</h3><span class="mOutcome">${esc(r.outcome)}</span></div>` : ''}`;
}

function openOrg(key){
  const o = ORGS.find(x => x.key === key);
  if (!o) return;
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <button class="mClose" aria-label="닫기">✕</button>
    <div class="mOver"><span>${esc(o.type.replace(/:\s*$/,''))}</span><span>·</span><span>${esc(o.ts.slice(0,16))} 첫 신청</span>${o.rows.length > 1 ? `<span>·</span><span>신청 ${o.rows.length}건</span>` : ''}</div>
    <div class="mName">${esc(o.org)}</div>
    <div class="mChips">
      ${o.regions.map(r => `<span>📍 ${esc(r)}</span>`).join('')}
      ${o.fieldsArr.map(f => `<span class="gray">${esc(f)}</span>`).join('')}
    </div>
    ${o.rows.map((r, i) =>
      (i > 0 ? '<hr class="mDivider"/>' : '') +
      personBlock(r, o.rows.length > 1 ? `신청 ${i + 1} · ${r.name} (${r.ts.slice(5,16)})` : '')
    ).join('')}`;
  const ov = document.getElementById('overlay');
  ov.classList.add('open');
  ov.getBoundingClientRect();
  ov.classList.add('vis');
  ov.scrollTop = 0;
  document.body.style.overflow = 'hidden';
  modal.querySelector('.mClose').addEventListener('click', closeOrg);
}
function closeOrg(){
  const ov = document.getElementById('overlay');
  ov.classList.remove('vis');
  document.body.style.overflow = '';
  setTimeout(() => ov.classList.remove('open'), 250);
}
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeOrg();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOrg(); });

/* ── 전체 렌더 ── */
function render(data){
  const rows = data.rows;
  ORGS = dedupeOrgs(rows);
  BY_REGION = {};
  Object.keys(REGIONS).forEach(k => BY_REGION[k] = []);
  NAT_ORGS = [];
  ORGS.forEach(o => {
    o.regions.forEach(rg => {
      const key = rg.trim();
      if (key === NATIONWIDE) { NAT_ORGS.push(o); return; }
      const match = Object.keys(REGIONS).find(k => key === k || key.startsWith(k.split('/')[0]));
      if (match && !BY_REGION[match].includes(o)) BY_REGION[match].push(o);
    });
  });

  const pct = Math.min(100, Math.round(ORGS.length / GOAL * 100));
  countUp(document.getElementById('teamCount'), ORGS.length);
  countUp(document.getElementById('pct'), pct, '%');
  document.getElementById('appCount').textContent = rows.length;
  document.getElementById('orgCount').textContent = ORGS.length;
  document.getElementById('updated').textContent =
    `기준: ${data.updatedAt}` + (DATA_URL ? ' · 시트 자동 연동' : ' · 수동 저장본');
  requestAnimationFrame(() => {
    document.getElementById('meterFill').style.width = pct + '%';
  });

  const nat = document.getElementById('natPill');
  const uniqNat = [...new Set(NAT_ORGS.map(o => o.org))];
  nat.innerHTML = uniqNat.length
    ? `<div class="natPill"><span class="dot"></span><b>전국 활동 ${uniqNat.length}팀</b> ${uniqNat.map(esc).join(', ')}</div>`
    : '';

  renderMap();
  renderDetail();
  renderKeywords();
  renderOrgList();
}

document.getElementById('resetBtn').addEventListener('click', () => {
  selected = null;
  keyword = null;
  applySelection();
  renderDetail();
  renderKeywords();
  renderOrgList();
});

async function load(){
  if (DATA_URL) {
    try {
      const res = await fetch(DATA_URL);
      const data = await res.json();
      render(data);
      return;
    } catch (e) {
      console.warn('시트 연동 실패', e);
      render(SNAPSHOT);
      document.getElementById('updated').textContent = '시트 연동에 실패했어요 — 새로고침 해보세요';
      return;
    }
  }
  render(SNAPSHOT);
}
/* ── 비밀번호 게이트 (캐주얼 차단: 검색·우연 유입 방지용) ── */
const GATE_HASH = '03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4';
async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}
function unlock(){
  document.body.classList.remove('locked');
  load();
}
async function tryGate(){
  const pw = document.getElementById('gatePw').value;
  if (!pw) return;
  if (await sha256(pw) === GATE_HASH) {
    sessionStorage.setItem('tfi_gate', '1');
    unlock();
  } else {
    document.getElementById('gateErr').textContent = '비밀번호가 맞지 않아요';
    document.getElementById('gatePw').value = '';
  }
}
document.getElementById('gateBtn').addEventListener('click', tryGate);
document.getElementById('gatePw').addEventListener('keydown', e => { if (e.key === 'Enter') tryGate(); });
if (sessionStorage.getItem('tfi_gate') === '1') unlock();
else document.getElementById('gatePw').focus();
</script>
